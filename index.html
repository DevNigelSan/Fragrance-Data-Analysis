<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragrance Finder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="ambient-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="site-header">
    <h1>Fragrance Finder</h1>
    <p>Find your ideal fragrance by notes, ranked by rating.</p>
  </header>

  <main>
    <p class="stats-bar">Searching 24,063 fragrances from Fragrantica</p>
    <section id="search-section">
      <form id="note-form">
        <label for="note-input">Enter fragrance notes</label>
        <input type="text" id="note-input" placeholder="e.g. bergamot, vanilla, sandalwood" autocomplete="off">
        <button type="submit">Find fragrances</button>
      </form>
      <p class="hint">Separate multiple notes with commas.</p>
      <div class="filter-pills">
        <button class="pill active">All</button>
        <button class="pill">Men</button>
        <button class="pill">Women</button>
        <button class="pill">Unisex</button>
        <span class="pill-divider"></span>
        <button class="pill">Floral</button>
        <button class="pill">Woody</button>
        <button class="pill">Oriental</button>
        <button class="pill">Fresh</button>
      </div>
    </section>>

   <section id="results-section">
      <div id="results-count"></div>
      <div id="results-grid">
        <div class="fragrance-card">
          <button class="favorite-btn" aria-label="Save to favorites">♡</button>
          <div class="brand">Sample Brand</div>
          <div class="name">Amber Nocturne</div>
          <span class="rating">4.42 ★</span>
          <div class="notes"><strong>Notes:</strong> bergamot, amber, sandalwood</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Data sourced from Fragrantica via Kaggle.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
